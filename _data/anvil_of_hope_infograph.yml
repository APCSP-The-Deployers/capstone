    subtitle: "Harnessing the power of machine learning to help a nonprofit organization"
    description: "A design-based research capstone that rebuilds the Poway Woman's Club website from the ground up. The club is a 501(c)(3) nonprofit founded in 1960 and affiliated with the General Federation of Women's Clubs International. For over six decades it has served Poway through scholarships, art exhibits, library support, and youth leadership programs — but its current site is a table-based layout with clashing colors, a broken email link, and no clear communication of its mission. This project delivers a modern, welcoming interface that makes the club's purpose obvious at a glance, lets new members sign up and pay dues online, gives existing members a space to interact through comments and calendars, and provides administrators with a dashboard to manage everything without touching code."
